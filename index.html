<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Quiz Professor Moreira</title>
<style>
:root{--azul:#06224a;--azul2:#0b3a7a;--laranja:#ff8a00;--verde:#0f8b4c;--vermelho:#c62828;--fundo:#f4f7fb;--texto:#111827;}
*{box-sizing:border-box}
body{margin:0;font-family:Arial,Helvetica,sans-serif;background:linear-gradient(180deg,#eef5ff,#fff);color:var(--texto);}
.app{min-height:100vh;display:flex;flex-direction:column;max-width:680px;margin:0 auto;background:#fff;border-left:4px solid var(--azul);border-right:4px solid var(--azul);}
header{background:var(--azul);color:white;padding:14px 16px;border-bottom:5px solid var(--laranja);position:sticky;top:0;z-index:5}
.brand{font-size:14px;font-weight:800;letter-spacing:.3px;text-transform:uppercase;opacity:.95}
.title{font-size:21px;font-weight:900;margin-top:4px;line-height:1.15}
.progress-wrap{height:8px;background:#d7e4f7}
.progress{height:8px;background:var(--laranja);width:0%;transition:.25s}
main{flex:1;padding:16px 14px 105px;}
.card{background:white;border:2px solid #dbe7f7;border-radius:18px;padding:18px;box-shadow:0 8px 24px rgba(6,34,74,.12)}
.badge{display:inline-block;background:#eaf2ff;color:var(--azul);border:1px solid #c9daf7;padding:7px 10px;border-radius:999px;font-weight:900;margin-bottom:10px;font-size:14px}
.qtext{font-size:20px;line-height:1.45;font-weight:700;white-space:pre-wrap;color:#07152b}
.options{display:flex;flex-direction:column;gap:12px;margin-top:18px}
.opt{width:100%;text-align:left;border:2px solid #cdd9ea;background:#fff;border-radius:15px;padding:13px 13px;font-size:18px;line-height:1.35;font-weight:800;color:#101827;cursor:pointer}
.opt .letter{display:inline-flex;align-items:center;justify-content:center;min-width:34px;height:34px;margin-right:8px;border-radius:50%;background:var(--azul);color:#fff;font-weight:900}
.opt.selected{border-color:var(--laranja);background:#fff6e8;box-shadow:0 0 0 3px rgba(255,138,0,.14)}
.opt.correct{border-color:var(--verde);background:#eafaf1}
.opt.wrong{border-color:var(--vermelho);background:#fff0f0}
.answer-box{font-size:19px;line-height:1.5;font-weight:700;white-space:pre-wrap}
.answer-key{font-size:24px;font-weight:900;color:var(--verde);margin:8px 0 14px}
.comment{background:#f8fbff;border-left:6px solid var(--azul);padding:13px;border-radius:12px;margin-top:12px}
.footerbar{position:fixed;left:50%;transform:translateX(-50%);bottom:0;width:100%;max-width:680px;background:#ffffff;border-top:2px solid #dbe7f7;padding:10px 12px;display:grid;grid-template-columns:1fr 1fr;gap:10px;box-shadow:0 -8px 20px rgba(0,0,0,.08)}
.btn{border:none;border-radius:14px;padding:14px 10px;font-size:17px;font-weight:900;color:#fff;background:var(--azul);cursor:pointer}
.btn.secondary{background:#455a74}
.btn.orange{background:var(--laranja);color:#111}
.btn.green{background:var(--verde)}
.btn.full{grid-column:1/-1}
.start{text-align:center;padding-top:20px}
.start h1{font-size:28px;color:var(--azul);margin:8px 0}
.start p{font-size:18px;line-height:1.45;font-weight:700}
.stats{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:14px}
.stat{border:2px solid #dbe7f7;border-radius:14px;padding:14px;background:#f8fbff;font-weight:900;text-align:center}
.grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-top:16px}
.navnum{border:1px solid #cbd8ea;background:#f7faff;border-radius:10px;padding:10px 0;font-weight:900;color:var(--azul)}
.navnum.answered{background:#eafaf1;border-color:#9bd8b8}
.navnum.current{outline:3px solid var(--laranja)}
.small{font-size:13px;opacity:.85;font-weight:700;margin-top:8px}
@media(max-width:420px){.qtext{font-size:19px}.opt{font-size:17px}main{padding-left:10px;padding-right:10px}}
</style>
</head>
<body><div style="text-align:center;font-size:42px;font-weight:bold;padding:20px;">40 QUESTÕES DO CFC/FGV - CONTABILIDADE GERAL</div>
<div class="app">
<header><div class="brand">Curso de Contabilidade • Professor Moreira</div><div class="title">Mobile Quiz</div></header>
<div class="progress-wrap"><div id="progress" class="progress"></div></div>
<main id="screen"></main>
<div class="footerbar" id="buttons"></div>
</div>
<script>
const QUESTIONS = [{"n": 1, "stem": "Desreconhecimento é a retirada de parte ou da totalidade de ativo ou passivo reconhecido do balanço patrimonial da entidade. \nO desreconhecimento normalmente ocorre quando esse item não atende mais à definição de ativo ou passivo, que expirou, \nfoi consumido, recebido, executado ou transferido. \nA máquina utilizada para a produção do principal produto de uma determinada entidade deve ser desreconhecida quando", "options": [{"letter": "A", "text": "perder todo o potencial de produzir benefícios econômicos para a entidade."}, {"letter": "B", "text": "estiver parcialmente depreciado."}, {"letter": "C", "text": "sofrer perda de valor recuperável."}, {"letter": "D", "text": "estiver sob controle da entidade."}], "answer": "A", "comment": "Desreconhece-se o ativo quando ele deixa de gerar benefícios econômicos ou potencial de serviço. Depreciação parcial e impairment não significam retirada automática do balanço."}, {"n": 2, "stem": "Conforme a NBC TG – ESTRUTURA CONCEITUAL, uma Receita reflete aumento nos ativos, ou redução nos passivos, que \nresultam em aumentos no patrimônio líquido, exceto aqueles referentes a contribuições de detentores de direitos sobre o \npatrimônio.  \nAvalie se são reconhecidos como Receita, nesse contexto, os seguintes itens: \nI. Ganho de aplicação financeira. \nII. Transferência de estoques a clientes. \nIII. Ganho na venda de imobilizado. \nIV. Entrada de recursos pela emissão/venda de debêntures. \nV. Entrada de recursos pela integralização do capital social. \nVI. Ganho na venda de ações em tesouraria. \nSão considerados receitas os itens", "options": [{"letter": "A", "text": "IV, V e VI."}, {"letter": "B", "text": "II, III e VI."}, {"letter": "C", "text": "I, III e IV."}, {"letter": "D", "text": "I, II e III."}], "answer": "D", "comment": "Receitas abrangem aumentos de ativos ou reduções de passivos que aumentam o PL, exceto aportes dos sócios. Aplicação financeira, venda de estoques e ganho na venda de imobilizado se enquadram; debêntures geram passivo, capital social é aporte e ações em tesouraria envolvem PL."}, {"n": 3, "stem": "O conceito de Capital é adotado pela maioria das entidades na elaboração das Demonstrações Contábeis. A seleção do conceito \napropriado de Capital pela entidade deve ser baseada nas necessidades dos seus usuários, principalmente, os preocupados \ncom a manutenção de capital nominal investido ou com o poder de compra do capital investido. \nA manutenção do Capital em que o lucro é auferido somente se o montante dos ativos líquidos no final do período exceder o \nmontante dos ativos líquidos no início do período, após excluir quaisquer distribuições para, e contribuições de, sócios durante \no período, é a Manutenção do", "options": [{"letter": "A", "text": "Capital Físico."}, {"letter": "B", "text": "Capital Financeiro."}, {"letter": "C", "text": "Capital Social."}, {"letter": "D", "text": "Capital Integralizado."}], "answer": "B", "comment": "A descrição corresponde à manutenção do capital financeiro: compara-se o valor financeiro dos ativos líquidos finais com os iniciais, excluindo contribuições e distribuições aos sócios."}, {"n": 4, "stem": "As demonstrações contábeis são normalmente elaboradas com base na suposição de que a entidade que reporta está em \ncontinuidade operacional. \nDesse modo, presume-se que a entidade não tem a intenção e nem a necessidade de", "options": [{"letter": "A", "text": "tornar-se internacional."}, {"letter": "B", "text": "modificar a sua atividade-fim."}, {"letter": "C", "text": "entrar em liquidação ou deixar de negociar."}, {"letter": "D", "text": "expandir os seus negócios para outras localidades."}], "answer": "C", "comment": "Continuidade operacional presume que a entidade continuará operando, sem intenção ou necessidade de liquidação ou encerramento das atividades."}, {"n": 5, "stem": "Conforme a NBC TG 04 (R4) – ATIVO INTANGÍVEL, não são exemplos de gastos a serem reconhecidos como despesa aqueles \nincorridos com", "options": [{"letter": "A", "text": "atividades pré-operacionais destinadas a constituir a empresa."}, {"letter": "B", "text": "treinamento do pessoal próprio."}, {"letter": "C", "text": "publicidade e atividades promocionais."}, {"letter": "D", "text": "o desenvolvimento de ativos intangíveis gerados internamente."}], "answer": "D", "comment": "Gastos de desenvolvimento de intangível gerado internamente podem ser ativados quando atendidos os critérios da NBC TG 04. Os demais exemplos normalmente são despesa."}, {"n": 6, "stem": "A Sociedade Empresária A possui estoque de um mix de mercadorias para revenda e deseja mensurar as mercadorias da \ncategoria b de acordo com a NORMA BRASILEIRA DE CONTABILIDADE NBC TG 16 (R2) – ESTOQUES. Em termos unitários, o \nvalor de custo das mercadorias dessa categoria é de R$20; o valor realizável líquido é de R$15 e o preço de venda é de R$30. \nConsiderando a quantidade de mil unidades, o seguinte valor dessas mercadorias deve ser apresentado no balanço patrimonial:", "options": [{"letter": "A", "text": "R$15."}, {"letter": "B", "text": "R$15.000."}, {"letter": "C", "text": "R$20.000."}, {"letter": "D", "text": "R$30.000."}], "answer": "B", "comment": "Estoques são mensurados pelo menor valor entre custo e valor realizável líquido. Como o custo unitário é R$20 e o VRL é R$15, usa-se R$15 × 1.000 = R$15.000."}, {"n": 7, "stem": "Em janeiro de 2024, uma companhia aérea anunciou uma promoção especial de Dia das Mães e vendeu, em fevereiro,  \n200 passagens aéreas do Rio de Janeiro para Porto Alegre, por R$300 cada, recebidos à vista. \nEm maio de 2024, os aeroportos de Porto Alegre foram fechados, de modo que a companhia aérea comunicou aos clientes \nque as passagens poderiam ser utilizadas em junho, sem pagamento de taxas e penalidades. Suponha que todos os clientes \nviajem em junho de 2024. \nNesse caso, de acordo com a NBC TG 47 – Receita de Contratos com Clientes, a receita da companhia aérea relativa à venda \ndas 200 passagens deve ser reconhecida no mês de", "options": [{"letter": "A", "text": "janeiro."}, {"letter": "B", "text": "fevereiro."}, {"letter": "C", "text": "maio."}, {"letter": "D", "text": "junho."}], "answer": "D", "comment": "Na NBC TG 47, a receita é reconhecida quando a obrigação de desempenho é satisfeita. A viagem ocorreu em junho; logo, a receita é reconhecida em junho."}, {"n": 8, "stem": "De acordo com a Lei no 6.404/76, em uma sociedade empresária, as Reservas de Capital poderão ser utilizadas para absorver \nprejuízos quando", "options": [{"letter": "A", "text": "não houver ações em tesouraria."}, {"letter": "B", "text": "estes estiverem acumulados há no mínimo três exercícios sociais."}, {"letter": "C", "text": "estes ultrapassarem os lucros acumulados e as reservas de lucros."}, {"letter": "D", "text": "houver garantia de que os dividendos mínimos obrigatórios serão pagos em conformidade."}], "answer": "C", "comment": "Reservas de capital podem absorver prejuízos quando estes ultrapassarem lucros acumulados e reservas de lucros."}, {"n": 9, "stem": "Uma sociedade empresária apresenta a seus usuários externos as informações sobre a base de preparação das demonstrações \nfinanceiras e das práticas contábeis específicas selecionadas e aplicadas para negócios e eventos significativos.  \nConforme a Lei nº 6.404/76, essa informação deve ser incluída", "options": [{"letter": "A", "text": "nas Notas Explicativas."}, {"letter": "B", "text": "no Relatório do Auditor."}, {"letter": "C", "text": "no Relatório da Administração."}, {"letter": "D", "text": "na Carta de Responsabilidade da Administração."}], "answer": "A", "comment": "As bases de preparação e práticas contábeis significativas são divulgadas nas notas explicativas."}, {"n": 10, "stem": "De acordo com a NBC TG 02 (R3) – EFEITOS DAS MUDANÇAS NAS TAXAS DE CÂMBIO E CONVERSÃO DE DEMONSTRAÇÕES \nCONTÁBEIS, os elementos do balanço patrimonial podem ser classificados como monetários e não monetários. \nAssinale a opção que indica um ativo classificado como ativo não monetário em uma papelaria.", "options": [{"letter": "A", "text": "Estoques."}, {"letter": "B", "text": "Contas a receber."}, {"letter": "C", "text": "Aplicações financeiras."}, {"letter": "D", "text": "Adiantamento de clientes."}], "answer": "A", "comment": "Estoques são ativos não monetários, pois não representam direito de receber valor fixo ou determinável em moeda."}, {"n": 11, "stem": "Conforme a Lei no 6.404/76, no Balanço Patrimonial, as contas do ativo são apresentadas de acordo com a ordem decrescente \nde grau de", "options": [{"letter": "A", "text": "liquidez."}, {"letter": "B", "text": "relevância."}, {"letter": "C", "text": "objetividade."}, {"letter": "D", "text": "valor monetário."}], "answer": "A", "comment": "No ativo, as contas são apresentadas em ordem decrescente de liquidez."}, {"n": 12, "stem": "Em 2023, a Demonstração do Resultado do Exercício de uma entidade apresentou Receita Líquida de R$200.000 e Lucro Bruto \nde R$150.000. \nPode-se constatar que, na demonstração, a seguinte conta apresenta saldo de R$50.000:", "options": [{"letter": "A", "text": "despesas de vendas."}, {"letter": "B", "text": "despesas operacionais."}, {"letter": "C", "text": "deduções da receita."}, {"letter": "D", "text": "custo das mercadorias vendidas."}], "answer": "D", "comment": "Lucro Bruto = Receita Líquida – CMV. Se Receita Líquida é R$200.000 e Lucro Bruto R$150.000, o CMV é R$50.000."}, {"n": 13, "stem": "Uma sociedade empresária apresenta saldo de R$80.000 na conta “Despesas antecipadas”. \nNas Demonstrações contábeis, essa conta é apresentada como", "options": [{"letter": "A", "text": "ativo, no balanço patrimonial."}, {"letter": "B", "text": "passivo, no balanço patrimonial."}, {"letter": "C", "text": "outras despesas, na demonstração do resultado do exercício."}, {"letter": "D", "text": "despesas operacionais, na demonstração do resultado do exercício."}], "answer": "A", "comment": "Despesas antecipadas representam direito a benefício futuro; por isso são classificadas como ativo no balanço patrimonial."}, {"n": 14, "stem": "Considere os seguintes elementos das demonstrações contábeis: \nI. Ativo. \nII. Despesa. \nIII. Receita. \nIV. Passivo. \nV. Patrimônio Líquido. \nDesses elementos os que apresentam natureza devedora são:", "options": [{"letter": "A", "text": "I e II, apenas."}, {"letter": "B", "text": "I e III, apenas."}, {"letter": "C", "text": "II e IV, apenas."}, {"letter": "D", "text": "I, III e V, apenas."}], "answer": "A", "comment": "Ativo e despesa têm natureza devedora. Receita, passivo e patrimônio líquido têm natureza credora."}, {"n": 15, "stem": "Para ser reconhecido, um ativo imobilizado precisa atender à definição de ativo imobilizado, ter relevância e representação \nfidedigna, apresentar um potencial de entrada de recursos econômicos com o uso ou a venda do ativo, e que possa ser \nmensurado com base em estimativas confiáveis. \nSão considerados custos diretamente atribuíveis ao Ativo Imobilizado para sua mensuração no reconhecimento inicial pelo \ncusto histórico, os listados a seguir, à exceção de um. Assinale-o.", "options": [{"letter": "A", "text": "Custos de abertura de nova instalação."}, {"letter": "B", "text": "Honorários profissionais."}, {"letter": "C", "text": "Custos de frete e manuseio."}, {"letter": "D", "text": "Custos de preparação do local."}], "answer": "A", "comment": "Custos de abertura de nova instalação não compõem o custo do ativo imobilizado. Frete, manuseio, preparação do local e honorários diretamente atribuíveis podem compor o custo."}, {"n": 16, "stem": "Uma entidade deseja reconhecer um ativo em seu balanço patrimonial. A sua mensuração envolve estimativas que estão sujeitas a incertezas. \nNesse caso, a entidade", "options": [{"letter": "A", "text": "não deve reconhecer nem divulgar o ativo, uma vez que não há objetividade em sua mensuração."}, {"letter": "B", "text": "deve reconhecer o ativo sem mencionar a existência de estimativas, uma vez que estas foram elaboradas com zelo e são, \nportanto, confiáveis."}, {"letter": "C", "text": "não deve reconhecer o ativo, mas evidenciá-lo em notas explicativas, uma vez que não há espaço para incertezas nas \ndemonstrações contábeis elaboradas."}, {"letter": "D", "text": "deve reconhecer o ativo e descrever e explicar as estimativas de forma clara e precisa, uma vez que o uso de estimativas \nrazoáveis é parte essencial da elaboração de informações financeiras."}], "answer": "D", "comment": "O uso de estimativas razoáveis é parte essencial da contabilidade. A entidade deve reconhecer o ativo e explicar claramente as estimativas relevantes."}, {"n": 17, "stem": "Em 2023, uma entidade desreconheceu um ativo de seu balanço patrimonial. \nAssinale a opção que indica uma possível causa para o desreconhecimento.", "options": [{"letter": "A", "text": "A entidade decidiu utilizar um terreno para finalidade diferente."}, {"letter": "B", "text": "A entidade perdeu o controle de um imóvel, por meio de decisão judicial."}, {"letter": "C", "text": "A entidade renegociou o prazo de recebimento de seus clientes, que estavam em situação financeira difícil."}, {"letter": "D", "text": "A entidade constatou que as suas máquinas poderiam ser utilizadas por tempo maior do que a vida útil prevista."}], "answer": "B", "comment": "A perda de controle de um imóvel por decisão judicial é causa de desreconhecimento do ativo."}, {"n": 18, "stem": "De acordo com o conceito de manutenção de capital financeiro, o lucro é auferido somente se o montante financeiro (ou \ndinheiro) dos ativos líquidos no final do período exceder o montante financeiro (ou dinheiro) dos ativos líquidos no início do \nperíodo, após excluir", "options": [{"letter": "A", "text": "compra e venda de ativos fixos durante o período."}, {"letter": "B", "text": "distribuições para, e contribuições de, sócios durante o período."}, {"letter": "C", "text": "reconhecimento contábil de receitas e de despesas durante o período."}, {"letter": "D", "text": "recebimento de receitas e pagamentos de despesas durante o período."}], "answer": "B", "comment": "Na manutenção do capital financeiro, excluem-se distribuições aos sócios e contribuições dos sócios durante o período."}, {"n": 19, "stem": "De acordo com o CPC22 - Informações por Segmento, dois ou mais segmentos operacionais podem ser agregados em um único \nsegmento operacional se a agregação for compatível com o princípio básico desta norma, se os segmentos tiverem \ncaracterísticas econômicas semelhantes e se forem semelhantes em relação a cada um dos seguintes aspectos, à exceção de \num. Assinale-o.", "options": [{"letter": "A", "text": "Natureza dos processos de produção ou de distribuição."}, {"letter": "B", "text": "Tipo ou a categoria de clientes dos seus produtos e serviços."}, {"letter": "C", "text": "Resultados em termos absolutos iguais."}, {"letter": "D", "text": "Se aplicável, a natureza do ambiente regulatório."}], "answer": "C", "comment": "Segmentos podem ser agregados se tiverem características econômicas semelhantes e semelhanças operacionais. Resultados absolutos iguais não são requisito."}, {"n": 20, "stem": "Em relação à estruturação das Normas Brasileiras de Contabilidade Técnicas, analise as afirmações a seguir: \nI. São convergentes com as normas internacionais emitidas pelo International Accounting Standards Board (IASB). \nII. São convergentes com as normas norte-americanas emitidas pelo Financial Accounting Standards Board (FASB). \nIII. São editadas por necessidades locais, sem equivalentes internacionais. \nDe acordo com a Resolução CFC 1.328/11, que dispõe sobre a Estrutura das Normas Brasileiras de Contabilidade Técnicas, as \nNBC TG, as normas brasileiras de contabilidade são relacionadas ao que se afirma em", "options": [{"letter": "A", "text": "I, somente."}, {"letter": "B", "text": "I e II, somente."}, {"letter": "C", "text": "I e III, somente."}, {"letter": "D", "text": "II e III, somente."}], "answer": "C", "comment": "As NBC TG incluem normas convergentes às internacionais do IASB e também normas editadas por necessidades locais sem equivalente internacional."}, {"n": 21, "stem": "De acordo com a NBC TG Estrutura Conceitual - Estrutura Conceitual para Relatório Financeiro, os principais usuários aos quais \nse destinam os relatórios financeiros para fins gerais são representados por", "options": [{"letter": "A", "text": "empregados, clientes e fornecedores."}, {"letter": "B", "text": "detentores de participação societária e interessados em adquiri-la."}, {"letter": "C", "text": "população em geral, impactada direta e indiretamente pelos relatórios."}, {"letter": "D", "text": "investidores, credores por empréstimos e outros credores, existentes e potenciais."}], "answer": "D", "comment": "Os principais usuários dos relatórios financeiros para fins gerais são investidores, credores por empréstimos e outros credores, existentes e potenciais."}, {"n": 22, "stem": "A NBC TG ESTRUTURA CONCEITUAL estabelece os conceitos dos elementos das demonstrações contábeis. \nCom base nessa norma, avalie as afirmativas a seguir e assinale (V) para a verdadeira e (F) para a falsa. \n(   ) Ativo é um recurso econômico presente de propriedade da entidade como resultado de eventos passados. \n(   ) Passivo é uma obrigação futura da entidade de transferir um recurso econômico como resultado de eventos passados. \n(   ) Receitas são aumentos nos ativos, ou reduções nos passivos, que resultam em aumento no patrimônio líquido, exceto \naqueles referentes a contribuições de detentores de direitos sobre o patrimônio. \n(   ) Despesas são reduções nos ativos, ou aumentos nos passivos, que resultam em reduções no patrimônio líquido, exceto \naqueles referentes a distribuições aos detentores de direitos sobre o patrimônio. \nAs afirmativas são, respectivamente,", "options": [{"letter": "A", "text": "F – F – V – V."}, {"letter": "B", "text": "F – V – F – V."}, {"letter": "C", "text": "V – F – V – F."}, {"letter": "D", "text": "V – V – F – F."}], "answer": "A", "comment": "Ativo é recurso econômico presente controlado, não necessariamente de propriedade; passivo é obrigação presente, não futura. As definições de receita e despesa estão corretas."}, {"n": 23, "stem": "Influência significativa é o poder de participar das decisões sobre políticas financeiras e operacionais de uma investida, mas \nsem que haja o controle individual ou o conjunto dessas políticas.  \nA NBC TG 18 (R4) - INVESTIMENTO EM COLIGADA determina que a existência de influência significativa por investidor \ngeralmente é evidenciada por uma ou mais das seguintes formas, à exceção de uma. Assinale-a.", "options": [{"letter": "A", "text": "Indicação de funcionários para a investida."}, {"letter": "B", "text": "Operações materiais entre o investidor e a investida."}, {"letter": "C", "text": "Intercâmbio de diretores ou gerentes."}, {"letter": "D", "text": "Fornecimento de informação técnica essencial."}], "answer": "A", "comment": "A NBC TG 18 cita representação no conselho/diretoria, operações materiais, intercâmbio de administradores e fornecimento de informação técnica essencial. Indicação genérica de funcionários não é evidência típica."}, {"n": 24, "stem": "A empresa Serviços S.A. encerrou seu exercício em 31/12/2024, deixando de efetuar o lançamento referente à receita de \nserviços prestados a um cliente em dezembro e ainda não recebidos, deixando de obedecer, assim, ao regime de competência. \nComo consequência do erro cometido pela ausência desse registro,", "options": [{"letter": "A", "text": "o saldo da conta clientes ficou superavaliado."}, {"letter": "B", "text": "o saldo do disponível ficou subavaliado."}, {"letter": "C", "text": "a receita do exercício ficou superavaliada."}, {"letter": "D", "text": "o lucro do exercício ficou subavaliado."}], "answer": "D", "comment": "Pelo regime de competência, a receita de dezembro deveria ter sido reconhecida. Ao omitir o registro, a receita e o lucro ficaram subavaliados."}, {"n": 25, "stem": "A compreensão dos conceitos e métodos relacionados à Demonstração do Resultado do Exercício (DRE) e à Demonstração do \nResultado Abrangente (DRA) é fundamental para a adequada análise das variações do patrimônio líquido e para a tomada de \ndecisões baseadas nos resultados operacionais. \nA respeito do tema, analise as seguintes afirmativas: \nI. A recompra de ações de emissão da própria entidade para manutenção em tesouraria afeta o resultado abrangente por \nrepresentar uma redução no patrimônio líquido. \nII. O resultado abrangente compreende todos os componentes da demonstração do resultado e dos outros resultados \nabrangentes. \nIII. Pelo método da natureza da despesa, as despesas são classificadas conforme sua função, como administrativas, comerciais \ne de produção, facilitando a análise do custo dos produtos vendidos. \nIV. A informação sobre a natureza das despesas é útil para prever os fluxos de caixa futuros e requer divulgação adicional \nquando a classificação adotada na DRE for baseada no método da função das despesas. \nV. A entidade deve apresentar rubricas ou itens de receitas ou despesas como itens extraordinários, quer na demonstração \ndo resultado abrangente, quer na demonstração do resultado do período, quer nas notas explicativas. \nDe acordo com a NBC TG 26 (R5) - APRESENTAÇÃO DAS DEMONSTRAÇÕES CONTÁBEIS, estão corretas as afirmativas", "options": [{"letter": "A", "text": "II e IV, apenas."}, {"letter": "B", "text": "I, III e V, apenas."}, {"letter": "C", "text": "II, III e IV, apenas."}, {"letter": "D", "text": "I, II, IV e V, apenas."}], "answer": "A", "comment": "Resultado abrangente inclui resultado do período e outros resultados abrangentes. Quando a DRE usa função da despesa, exige-se divulgação adicional por natureza. Itens extraordinários não devem ser apresentados."}, {"n": 26, "stem": "A empresa S.A. é especializada na construção de galpões industriais sob encomenda de acordo com especificações exclusivas \nde cada cliente. Os contratos firmados pela empresa preveem que a construção ocorra no terreno do cliente, com pagamentos \nmensais vinculados ao andamento da obra, que pode durar de 6 a 10 meses. \nConsiderando as informações apresentadas e os preceitos da NBC TG 47 – RECEITA DE CONTRATO COM CLIENTE, o \nreconhecimento da receita deve ocorrer", "options": [{"letter": "A", "text": "somente após a emissão do certificado de aceitação técnica da obra pelo cliente."}, {"letter": "B", "text": "no momento da conclusão da obra, quando todos os riscos e benefícios são transferidos."}, {"letter": "C", "text": "no início do contrato, pois o pagamento mensal caracteriza o reconhecimento da receita."}, {"letter": "D", "text": "ao longo do tempo, pois o desempenho da entidade cria ou melhora ativo que o cliente controla à medida que é construído."}], "answer": "D", "comment": "A receita é reconhecida ao longo do tempo quando a entidade cria ou melhora ativo que o cliente controla à medida que é construído."}, {"n": 27, "stem": "Uma empresa S.A. celebrou um contrato no valor de R$ 30.000,00 para utilizar um equipamento por um período de 10 meses, \ncujo ativo subjacente do contrato foi considerado de baixo valor pela empresa. \nA administração da empresa S.A. decidiu aplicar a isenção de reconhecimento autorizada pelo item 5 da NBC TG 06 (R3). \nConsiderando-se as informações apresentadas e os preceitos da NBC TG 06 (R3) – ARRENDAMENTOS, o tratamento contábil \npara esse contrato é", "options": [{"letter": "A", "text": "registrar o valor total do contrato antecipadamente como despesa no início do contrato."}, {"letter": "B", "text": "capitalizar o valor do contrato como ativo imobilizado, amortizando ao longo do contrato."}, {"letter": "C", "text": "reconhecer os pagamentos do arrendamento como despesa no resultado, de forma linear ou sistemática, ao longo do prazo \ndo contrato."}, {"letter": "D", "text": "reconhecer um ativo de direito de uso e um passivo de arrendamento, ambos, ao valor presente estipulado no contrato."}], "answer": "C", "comment": "Para arrendamento de baixo valor com isenção aplicada, os pagamentos são reconhecidos como despesa de forma linear ou outra base sistemática."}, {"n": 28, "stem": "A Contabilidade de Custos possui uma linguagem própria que permite ao profissional da contabilidade constituir o processo \nde análise, apuração e divulgação das informações relacionadas a custos, à medida que se mostrarem pertinentes de acordo \ncom a necessidade informacional dos inúmeros stakeholders. \nTomando por base esse processo de terminologias na contabilidade de custos, assinale a afirmativa correta.", "options": [{"letter": "A", "text": "Os gastos representam a compra de um produto ou serviço que tem por capacidade gerar o dispêndio de recursos \nfinanceiros por parte da empresa, a exemplo da aquisição de um imobilizado."}, {"letter": "B", "text": "Os custos representam um sacrifício monetário referente ao pagamento dos gastos, a exemplo do consumo de matéria-prima."}, {"letter": "C", "text": "As despesas podem ser entendidas como os recursos utilizados na constituição de bens ou serviços em uma indústria, como \nexemplo tem-se as despesas com vendas e comissões."}, {"letter": "D", "text": "As perdas são gastos anormais e involuntários do processo produtivo e já estão incluídas no custo do produto."}], "answer": "A", "comment": "Gasto é a compra de bem ou serviço que gera sacrifício financeiro, como aquisição de imobilizado. Custo é gasto usado na produção; despesa é ligada à obtenção de receita; perda anormal não integra o custo normal."}, {"n": 29, "stem": "Uma empresa realizou a contagem de seus estoques, acabando por superavaliar o estoque inicial, mantendo o controle de \ncompras e estoque final nos valores corretos. \nEm consequência da superavaliação do estoque inicial é correto afirmar que", "options": [{"letter": "A", "text": "a receita de vendas do período corrente foi subavaliada."}, {"letter": "B", "text": "o lucro acumulado do período corrente foi superavaliado."}, {"letter": "C", "text": "o custo dos produtos vendidos do período corrente foi superavaliado."}, {"letter": "D", "text": "o estoque final foi subavaliado."}], "answer": "C", "comment": "CMV = estoque inicial + compras – estoque final. Se o estoque inicial foi superavaliado, o CMV também fica superavaliado."}, {"n": 30, "stem": "Em 2024, uma empresa de varejo estimava inadimplência de 2% sobre o saldo de Clientes. \nEm 2025, buscando aumentar as vendas, a empresa reduziu as suas exigências para concessão de crédito aos clientes. Assim, \numa análise criteriosa indicava que a inadimplência seria muito próxima de 5% nesse ano. No entanto, uma vez que os \nadministradores da empresa são avaliados de acordo com o resultado operacional, eles escolheram continuar utilizando a \nestimativa anterior, de 2%. \nAo avaliar se a informação contábil pode ser considerada representação fidedigna, é correto concluir que", "options": [{"letter": "A", "text": "pode ser, uma vez que é comparável."}, {"letter": "B", "text": "pode ser, uma vez que é tempestiva."}, {"letter": "C", "text": "não pode ser, uma vez que não é neutra."}, {"letter": "D", "text": "não pode ser, uma vez que não é verificável."}], "answer": "C", "comment": "Manter estimativa sabidamente inadequada para melhorar resultado compromete a neutralidade, logo a informação não é representação fidedigna."}, {"n": 31, "stem": "Em janeiro de 2026, uma entidade fabril assinou um contrato para a compra de uma máquina por R$ 50.000,00. O montante \nfoi pago integralmente em fevereiro. A máquina foi recebida em março, quando foi instalada e disponibilizada para uso. No \nentanto, por decisão da entidade, a máquina começou a ser efetivamente utilizada em abril. \nNo Balanço Patrimonial da entidade, a máquina deve ser reconhecida a partir de", "options": [{"letter": "A", "text": "janeiro."}, {"letter": "B", "text": "fevereiro."}, {"letter": "C", "text": "março."}, {"letter": "D", "text": "abril."}], "answer": "C", "comment": "A máquina é reconhecida quando está disponível para uso, em março, mesmo que o uso efetivo só comece em abril."}, {"n": 32, "stem": "Em 01/03/2026, uma sociedade empresária adquiriu um equipamento de grande porte por um montante considerado \nrelevante para ela. Para a aquisição, foram pagos R$ 100.000,00 à vista, e o restante tinha prazo para pagamento de 60 dias. \nEssa parcela complementar estava fixada em R$ 105.000,00, enquanto o seu valor presente na data da compra era de \nR$ 100.000,00. \nAssinale a opção que indica o custo histórico do passivo líquido no momento da compra, de acordo com a NBC TG ESTRUTURA \nCONCEITUAL (R2) – ESTRUTURA CONCEITUAL PARA RELATÓRIO FINANCEIRO:", "options": [{"letter": "A", "text": "R$ 100.000,00."}, {"letter": "B", "text": "R$ 105.000,00."}, {"letter": "C", "text": "R$ 200.000,00."}, {"letter": "D", "text": "R$ 205.000,00."}], "answer": "A", "comment": "O custo histórico do passivo líquido no reconhecimento inicial corresponde ao valor presente da obrigação: R$100.000,00."}, {"n": 33, "stem": "Uma empresa S.A. apresentou, em 31/12/2025, ativos fiscais diferidos decorrentes de prejuízos fiscais, bases negativas de \ncontribuição social e diferenças temporárias dedutíveis, totalizando R$ 6.669.000,00 nas demonstrações individuais e \nR$ 7.121.000,00 nas demonstrações consolidadas. \nConforme divulgado em nota explicativa, a realização desses ativos depende da geração futura de lucros tributáveis suficientes \npara permitir a compensação dos prejuízos fiscais e das bases negativas, bem como da reversão das diferenças temporárias \ndedutíveis. A administração elaborou projeções de resultados tributáveis futuros que suportam o reconhecimento desses \nativos fiscais diferidos. \nO auditor independente incluiu, em seu relatório, parágrafo chamando a atenção para a nota explicativa, destacando a \nexistência de incerteza relacionada ao prazo de realização dos ativos fiscais diferidos, mas afirmando que sua opinião não está \nressalvada em relação a esse assunto. \nConsiderando as informações apresentadas e os preceitos da NBC TG 32 (R4) – TRIBUTOS SOBRE O LUCRO, conclui-se que", "options": [{"letter": "A", "text": "a existência de prejuízos fiscais acumulados impede o reconhecimento de ativos fiscais diferidos, devendo tais valores ser \nreconhecidos somente quando ocorrer efetivamente lucro tributável suficiente para sua compensação."}, {"letter": "B", "text": "a entidade deve reconhecer ativo fiscal diferido decorrente de prejuízos fiscais, somente quando for provável a existência \nde lucro tributável futuro suficiente para sua compensação."}, {"letter": "C", "text": "os ativos fiscais diferidos decorrentes de prejuízos fiscais podem ser reconhecidos com base em estimativas de lucros \ntributáveis futuros elaboradas pela administração, independente da avaliação de probabilidade de realização."}, {"letter": "D", "text": "a inclusão de parágrafo, chamando a atenção no relatório do auditor, indica discordância quanto ao reconhecimento do \nativo fiscal diferido e implica modificação na opinião de auditoria."}], "answer": "B", "comment": "Ativo fiscal diferido por prejuízos fiscais é reconhecido quando for provável a existência de lucro tributável futuro suficiente para compensação."}, {"n": 34, "stem": "Uma companhia aberta brasileira atua no comércio varejista de bens de consumo por meio de lojas físicas e de plataforma \ndigital. Em suas vendas on-line, a entidade também realiza o transporte das mercadorias por meio de logística própria. Em \ndeterminado dia, um cliente adquiriu um livro por meio do website da companhia. \nO pagamento foi realizado instantaneamente via PIX, e a nota fiscal eletrônica foi imediatamente emitida e enviada ao cliente \npor e-mail. O livro foi separado no centro de distribuição da empresa e despachado em caminhão pertencente à própria \ncompanhia, responsável pela entrega ao consumidor final. Durante o trajeto, antes da entrega ao cliente, o caminhão sofreu \num acidente e parte das mercadorias transportadas foi completamente destruída, incluindo o livro adquirido pelo cliente. \nConsiderando-se as informações apresentadas e os preceitos da NBC TG 47 – RECEITA DE CONTRATO COM CLIENTE, a receita \ndeve ser reconhecida", "options": [{"letter": "A", "text": "quando o pagamento via PIX foi realizado, pois a contraprestação foi recebida e a nota fiscal emitida; a perda do livro deve \nser reconhecida pelo cliente, que já havia quitado a compra."}, {"letter": "B", "text": "no momento do despacho da mercadoria pelo centro de distribuição, pois a empresa já cumpriu sua obrigação principal; a \nperda decorrente do acidente deve ser reconhecida pelo cliente."}, {"letter": "C", "text": "quando o livro for efetivamente entregue ao cliente, momento em que ocorre a transferência de controle do bem; como o \nacidente ocorreu antes da entrega, a perda do livro deve ser reconhecida pela própria companhia."}, {"letter": "D", "text": "no momento da emissão da nota fiscal eletrônica, pois esse ato caracteriza a transferência jurídica do bem; a perda \ndecorrente do acidente deve ser reconhecida como despesa operacional do cliente."}], "answer": "C", "comment": "A receita é reconhecida quando o controle é transferido ao cliente. Como a entrega não ocorreu, a perda antes da entrega é da própria companhia."}, {"n": 35, "stem": "Com base na NBC TG 06 (R3) – OPERAÇÕES DE ARRENDAMENTO MERCANTIL, assinale a opção que apresenta o procedimento \ncorreto para a contabilização de um contrato de arrendamento de uma máquina celebrado entre a arrendatária ABC e a \narrendadora XYZ.", "options": [{"letter": "A", "text": "O ativo de direito de uso deve ser mensurado inicialmente pelo valor justo da máquina, e posteriormente pelo mesmo valor \ncontábil de máquinas similares de propriedade da ABC."}, {"letter": "B", "text": "A empresa ABC, ao definir a vida útil para cálculo da depreciação do ativo de direito de uso, precisou definir se permanecerá \nou não com a máquina permanentemente. Caso ela opte por não permanecer com a máquina ao final do contrato de \narrendamento, a vida útil será a menor entre o prazo do arrendamento e a vida útil da máquina."}, {"letter": "C", "text": "O reconhecimento do ativo de direito de uso pela ABC implica a baixa do ativo imobilizado pela XYZ, para evitar duplo \nreconhecimento do mesmo bem."}, {"letter": "D", "text": "A depreciação do ativo de direito de uso na arrendatária ABC tem como contrapartida o passivo de arrendamento \nreconhecido junto à XYZ."}], "answer": "B", "comment": "Se não houver transferência de propriedade ao final, a depreciação do direito de uso usa o menor prazo entre o arrendamento e a vida útil do ativo."}, {"n": 36, "stem": "Em 2023, uma empresa de consultoria contábil pagou R$ 20.000,00 a título de juros sobre empréstimo bancário. \nDe acordo com a NBC TG 03 (R3) – DEMONSTRAÇÃO DOS FLUXOS DE CAIXA, os juros pagos podem ser classificados, na \nDemonstração dos Fluxos de Caixa, como fluxos de caixa", "options": [{"letter": "A", "text": "operacionais ou de investimento."}, {"letter": "B", "text": "operacionais ou de financiamento."}, {"letter": "C", "text": "de investimento ou de financiamento."}, {"letter": "D", "text": "de financiamento ou de equivalentes de caixa."}], "answer": "B", "comment": "Na DFC, juros pagos podem ser classificados como fluxos operacionais ou de financiamento, desde que haja consistência."}, {"n": 37, "stem": "ma sociedade empresária apresentava a sua Demonstração dos Fluxos de Caixa de acordo com o método direto. \nEm 01/01/2025, resolveu começar a apresentar a demonstração de acordo com o método indireto. \nDesse modo, em 31/12/2025, a sociedade empresária divulgou a Demonstração dos Fluxos de Caixa de 31/12/2024, elaborada \nde acordo com o método indireto, para fins comparativos. Pôde-se constatar, a partir da demonstração, que as atividades \noperacional, de investimento e de financiamento geraram caixa para a sociedade empresária. \nAo comparar o saldo de caixa gerado pelas três atividades na Demonstração dos Fluxos de Caixa, referente a 31/12/2024, de \nacordo com o método direto e indireto, pode-se verificar que", "options": [{"letter": "A", "text": "o saldo de caixa gerado pelas três atividades permanece igual."}, {"letter": "B", "text": "o saldo de caixa apresentado pelas três atividades apresenta mudança."}, {"letter": "C", "text": "apenas o saldo de caixa gerado pela atividade operacional apresenta mudança."}, {"letter": "D", "text": "apenas o saldo de caixa gerado pela atividade de financiamento apresenta mudança."}], "answer": "A", "comment": "A mudança entre método direto e indireto altera apenas a forma de apresentação da atividade operacional, mas o caixa gerado pelas atividades permanece o mesmo."}, {"n": 38, "stem": "A cidade Alfa foi atingida por uma enchente nos meses de janeiro e fevereiro de X6, afetando diversas empresas da região. \nEntre elas, a Metalúrgica “M” Ltda. sofreu perdas significativas, com a inutilização de 25% de seus estoques. \nNo tratamento contábil a ser adotado pela Metalúrgica “M” Ltda. para o reconhecimento desse evento em sua contabilidade, \nessa perda deve ser reconhecida como", "options": [{"letter": "A", "text": "Custo da Mercadoria Vendida (CMV), uma vez que impacta diretamente o volume de estoques disponíveis para venda."}, {"letter": "B", "text": "despesa operacional (perdas por sinistro/enchente), sem necessidade de ajuste no saldo de estoques, tendo em vista a \nausência de expectativa de recuperação dos itens."}, {"letter": "C", "text": "normal no curso das operações da entidade, devendo ser apropriada ao resultado como custo, diluído entre as unidades \nproduzidas."}, {"letter": "D", "text": "despesa (perdas por sinistro/enchente), com a correspondente baixa no saldo de estoques, em função da inutilização dos \nbens e da ausência de expectativa de recuperação econômica."}], "answer": "D", "comment": "Perda anormal por enchente deve ser reconhecida como despesa/perda, com baixa correspondente dos estoques inutilizados."}, {"n": 39, "stem": "Para aplicação do método de equivalência patrimonial, quando se trata de investimentos em investidas com influência \nsignificativa, a NBC TG 18 (R4) – INVESTIMENTO EM COLIGADA E EM EMPREENDIMENTO CONTROLADO EM CONJUNTO traz \nalgumas situações em que se poderia considerar que a investidora detém uma influência significativa. \nAnalise as seguintes afirmativas acerca de influência significativa: \nI. Presume-se que a investidora tenha influência significativa sobre a investida se detiver, direta ou indiretamente, 20% ou \nmais do poder de voto da investida, a menos que possa ser claramente demonstrado o contrário. \nII. Caso a investidora detenha menos de 20% do poder de voto da investida, não é admissível supor influência significativa, \nem nenhuma hipótese. \nIII. A representação, no Conselho de Administração ou na diretoria da investida pela investidora, pode ser uma evidência de \ninfluência significativa da entidade investidora na investida. \nEstá correto o que se afirma em", "options": [{"letter": "A", "text": "I, apenas."}, {"letter": "B", "text": "II e III, apenas."}, {"letter": "C", "text": "I, II e III."}, {"letter": "D", "text": "I e III, apenas."}], "answer": "D", "comment": "A influência significativa é presumida com 20% ou mais do poder de voto, salvo prova em contrário; com menos de 20% ainda pode existir, e representação na administração é evidência."}, {"n": 40, "stem": "De acordo com a NBC TG 26 (R5) – Apresentação das Demonstrações Contábeis, além dos itens requeridos em outras normas, \na demonstração do resultado do período deve incluir as rubricas a seguir, com exceção de uma. Assinale-a.", "options": [{"letter": "A", "text": "Custos de financiamento."}, {"letter": "B", "text": "Distribuição do resultado do período."}, {"letter": "C", "text": "Parcela dos resultados de empresas investidas reconhecida por meio do método da equivalência patrimonial."}, {"letter": "D", "text": "Ganhos e perdas decorrentes do desreconhecimento de ativos financeiros mensurados pelo custo amortizado."}], "answer": "B", "comment": "Distribuição do resultado do período não é rubrica da DRE. Custos de financiamento, equivalência patrimonial e ganhos/perdas de desreconhecimento indicados pela norma podem constar."}];
let idx = Number(localStorage.getItem('pm_idx')||0);
let mode = localStorage.getItem('pm_started')==='1' ? 'question' : 'start';
let answers = JSON.parse(localStorage.getItem('pm_answers')||'{}');
function save(){localStorage.setItem('pm_idx',idx);localStorage.setItem('pm_answers',JSON.stringify(answers));localStorage.setItem('pm_started','1')}
function pct(){return ((idx+1)/QUESTIONS.length*100)}
function setButtons(html){document.getElementById('buttons').innerHTML=html}
function updateProgress(){document.getElementById('progress').style.width = mode==='start'?'0%':pct()+'%'}
function start(){mode='question'; idx=0; save(); render()}
function renderStart(){mode='start'; updateProgress(); document.getElementById('screen').innerHTML=`<div class="card start"><div class="badge">Padrão Professor Moreira</div><h1>Quiz de Contabilidade</h1><p></p><p><b>40 questões</b> SÓ QUESTÕES DO CFC/FGV</p></div>`; setButtons(`<button class="btn orange full" onclick="start()">INICIAR QUIZ</button>`);}
function renderQuestion(){mode='question'; save(); updateProgress(); const q=QUESTIONS[idx]; const selected=answers[q.n]||''; document.getElementById('screen').innerHTML=`<div class="card"><div class="badge">Questão ${idx+1} de ${QUESTIONS.length}</div><div class="qtext">${escapeHtml(q.stem)}</div><div class="options">${q.options.map(o=>`<button class="opt ${selected===o.letter?'selected':''}" onclick="choose('${o.letter}')"><span class="letter">${o.letter}</span>${escapeHtml(o.text)}</button>`).join('')}</div><div class="small">Toque em uma alternativa. Depois toque em “Ver resposta”.</div></div>`; setButtons(`<button class="btn secondary" onclick="prevQ()">VOLTAR</button><button class="btn orange" onclick="showAnswer()">VER RESPOSTA</button>`);}
function renderAnswer(){mode='answer'; save(); updateProgress(); const q=QUESTIONS[idx]; const chosen=answers[q.n]||'Não marcada'; const ok=chosen===q.answer; document.getElementById('screen').innerHTML=`<div class="card"><div class="badge">Resposta da questão ${idx+1}</div><div class="answer-key">Gabarito: letra ${q.answer}</div><div class="answer-box">Sua marcação: <b>${chosen}</b> ${chosen==='Não marcada'?'':(ok?'✅':'❌')}</div><div class="comment"><b>Comentário Professor Moreira:</b><br>${escapeHtml(q.comment)}</div><div class="options">${q.options.map(o=>`<div class="opt ${o.letter===q.answer?'correct':(o.letter===chosen && chosen!==q.answer?'wrong':'')}"><span class="letter">${o.letter}</span>${escapeHtml(o.text)}</div>`).join('')}</div></div>`; setButtons(`<button class="btn secondary" onclick="renderQuestion()">VOLTAR À QUESTÃO</button><button class="btn green" onclick="nextQ()">PRÓXIMA</button>`);}
function renderEnd(){mode='end'; updateProgress(); let correct=QUESTIONS.filter(q=>answers[q.n]===q.answer).length; document.getElementById('screen').innerHTML=`<div class="card start"><div class="badge">Resultado Final</div><h1>Quiz concluído</h1><div class="stats"><div class="stat">Acertos<br><span style="font-size:28px;color:var(--verde)">${correct}</span></div><div class="stat">Total<br><span style="font-size:28px;color:var(--azul)">${QUESTIONS.length}</span></div></div><div class="grid">${QUESTIONS.map((q,i)=>`<button class="navnum ${answers[q.n]?'answered':''}" onclick="idx=${i};renderQuestion()">${i+1}</button>`).join('')}</div></div>`; setButtons(`<button class="btn secondary" onclick="restart()">RECOMEÇAR</button><button class="btn orange" onclick="idx=0;renderQuestion()">REVISAR</button>`);}
function choose(letter){const q=QUESTIONS[idx]; answers[q.n]=letter; save(); renderQuestion();}
function showAnswer(){renderAnswer();}
function nextQ(){ if(idx<QUESTIONS.length-1){idx++; renderQuestion();} else renderEnd(); }
function prevQ(){ if(idx>0){idx--; renderQuestion();} else renderStart(); }
function restart(){localStorage.removeItem('pm_idx');localStorage.removeItem('pm_answers');localStorage.removeItem('pm_started');idx=0;answers={};renderStart();}
function escapeHtml(s){return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]));}
function render(){ if(mode==='start') renderStart(); else renderQuestion(); }
render();
</script>
